name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y libavformat-dev libavcodec-dev libavfilter-dev libavutil-dev libswresample-dev libswscale-dev libwavpack-dev gcc libegl1-mesa-dev xorg-dev
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          path-type: inherit
          update: true
          install: >-
            wget
            zip
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Install Dependencies
        run: >
          pacman -Syu &&
          pacman --noconfirm -S mingw-w64-x86_64-toolchain mingw-w64-x86_64-ffmpeg mingw-w64-x86_64-wavpack
      - name: Package
        run: mise run package:windows
      - name: Download smtc dll
        run: >
          wget https://github.com/supersonic-app/smtc-dll/releases/download/v0.1.2/SMTC.dll
      - name: Copy runtime DLLs
        run: >
          ldd Supersonic.exe | awk '/mingw64/ { print $3 }' | xargs -I{} cp -n "{}" .
      - name: Generate zip bundle
        run: >
          zip Supersonic_windows_x64.zip Supersonic.exe *.dll
      - name: Generate installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.8
        with:
          path: win_inno_installscript.iss
      - name: Rename installer
        run: cp Output/supersonic-installer.exe Supersonic_windows_x64_installer.exe
      - name: Upload zip
        uses: actions/upload-artifact@v7
        with:
          name: Supersonic_windows_x64.zip
          path: Supersonic_windows_x64.zip
      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: Supersonic_windows_x64_installer.exe
          path: Supersonic_windows_x64_installer.exe

  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - uses: jdx/mise-action@v4
      - name: Install Dependencies
        run: brew install --force ffmpeg wavpack dylibbundler
      - name: Setup path
        run: export C_INCLUDE_PATH=/usr/local/include:/opt/homebrew/include:$C_INCLUDE_PATH && export LIBRARY_PATH=/usr/local/lib:/opt/homebrew/lib:$LIBRARY_PATH
      - name: Package app bundle
        run: >
          mise run package:macos &&
          mise run bundledeps:macos:homebrew &&
          mise run zip:macos
      - name: Rename artifact
        run: mv Supersonic.zip Supersonic_mac_arm64.zip
      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: Supersonic_mac_arm64.zip
          path: Supersonic_mac_arm64.zip

  build-macos-x64:
    name: Build macOS x64
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - uses: jdx/mise-action@v4
      - name: Install Dependencies
        run: brew install --force ffmpeg wavpack dylibbundler
      - name: Setup path
        run: export C_INCLUDE_PATH=/usr/local/include:/opt/homebrew/include:$C_INCLUDE_PATH && export LIBRARY_PATH=/usr/local/lib:/opt/homebrew/lib:$LIBRARY_PATH
      - name: Build and package app bundles
        run: >
          mise run package:macos &&
          mise run bundledeps:macos:homebrew &&
          mise run zip:macos &&
          mv Supersonic.zip Supersonic_mac_x64.zip
      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: Supersonic_mac_x64.zip
          path: Supersonic_mac_x64.zip

  build-ubuntu-22:
    name: Build Ubuntu 22.04
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y libavformat-dev libavcodec-dev libavfilter-dev libavutil-dev libswresample-dev libswscale-dev libwavpack-dev gcc libegl1-mesa-dev xorg-dev
      - name: Fyne package
        run: mise run package:linux
      - name: Rename artifact
        run: mv Supersonic.tar.xz Supersonic_ubuntu22.04_x64.tar.xz
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Supersonic_ubuntu22.04_x64.tar.xz
          path: Supersonic_ubuntu22.04_x64.tar.xz

  build-ubuntu-24:
    name: Build Ubuntu 24.04
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y libavformat-dev libavcodec-dev libavfilter-dev libavutil-dev libswresample-dev libswscale-dev libwavpack-dev gcc libegl1-mesa-dev xorg-dev
      - name: Fyne package
        run: mise run package:linux
      - name: Rename artifact
        run: mv Supersonic.tar.xz Supersonic_ubuntu24.04_x64.tar.xz
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Supersonic_ubuntu24.04_x64.tar.xz
          path: Supersonic_ubuntu24.04_x64.tar.xz

  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y libavformat-dev libavcodec-dev libavfilter-dev libavutil-dev libswresample-dev libswscale-dev libwavpack-dev gcc libegl1-mesa-dev xorg-dev
      - name: Build
        run: mise run build
      - name: Make appimage
        run: |
          chmod +x ./scripts/appimage-build.sh
          ./scripts/appimage-build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Supersonic-x86_64.AppImage
          path: Supersonic-x86_64.AppImage
